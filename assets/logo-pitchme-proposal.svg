<svg width="720" height="510" viewBox="0 0 720 510"
     xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

  <!-- Page background -->
  <rect width="720" height="510" fill="#F1F5F9"/>

  <!-- Header -->
  <text x="40" y="42" font-size="19" font-weight="800" fill="#1E293B">PitchMe</text>
  <text x="130" y="42" font-size="19" font-weight="300" fill="#2563EB"> — Proposition de logo</text>
  <text x="40" y="60" font-size="11" fill="#94A3B8">Bleu #1D4ED8  ·  Or #F59E0B  ·  Texte #1A202C</text>


  <!-- ━━━ ZONE 1 : Version principale, fond blanc ━━━ -->
  <rect x="40" y="78" width="640" height="128" rx="14" fill="white"/>
  <text x="58" y="97" font-size="8" font-weight="700" fill="#CBD5E1" letter-spacing="1.8">VERSION PRINCIPALE</text>

  <!-- Icon 60×60 -->
  <g transform="translate(58,106)">
    <rect width="60" height="60" rx="15" fill="#1D4ED8"/>
    <!-- Stem -->
    <rect x="13" y="8" width="9" height="44" rx="4.5" fill="white"/>
    <!-- Bowl outer -->
    <path fill="white" d="M 22 8 L 22 38 A 18 15 0 0 1 22 8 Z"/>
    <!-- Bowl counter -->
    <path fill="#1D4ED8" d="M 22 15 L 22 31 A 11 8 0 0 1 22 15 Z"/>
    <!-- Gold dot -->
    <circle cx="47" cy="47" r="6" fill="#F59E0B"/>
  </g>

  <!-- Wordmark -->
  <text x="134" y="151" font-size="48">
    <tspan font-weight="800" fill="#1A202C">Pitch</tspan><tspan font-weight="300" fill="#2563EB">Me</tspan>
  </text>
  <text x="136" y="171" font-size="9.5" fill="#94A3B8" letter-spacing="2.8">CANDIDATURES · MARCHÉS</text>


  <!-- ━━━ ZONE 2 LEFT : Fond sombre ━━━ -->
  <rect x="40" y="226" width="310" height="128" rx="14" fill="#0F172A"/>
  <text x="58" y="246" font-size="8" font-weight="700" fill="#334155" letter-spacing="1.8">FOND SOMBRE</text>

  <g transform="translate(58,254)">
    <rect width="60" height="60" rx="15" fill="#1D4ED8"/>
    <rect x="13" y="8" width="9" height="44" rx="4.5" fill="white"/>
    <path fill="white" d="M 22 8 L 22 38 A 18 15 0 0 1 22 8 Z"/>
    <path fill="#1D4ED8" d="M 22 15 L 22 31 A 11 8 0 0 1 22 15 Z"/>
    <circle cx="47" cy="47" r="6" fill="#F59E0B"/>
  </g>

  <text x="134" y="299" font-size="48">
    <tspan font-weight="800" fill="#FFFFFF">Pitch</tspan><tspan font-weight="300" fill="#60A5FA">Me</tspan>
  </text>
  <text x="136" y="319" font-size="9.5" fill="#334155" letter-spacing="2.8">CANDIDATURES · MARCHÉS</text>


  <!-- ━━━ ZONE 2 RIGHT : Icônes seules (3 tailles) ━━━ -->
  <rect x="370" y="226" width="310" height="128" rx="14" fill="white"/>
  <text x="388" y="246" font-size="8" font-weight="700" fill="#CBD5E1" letter-spacing="1.8">ICÔNE — DIFFÉRENTES TAILLES</text>

  <!-- 96×96 -->
  <g transform="translate(388,250)">
    <rect width="96" height="96" rx="22" fill="#1D4ED8"/>
    <rect x="21" y="13" width="14" height="70" rx="7" fill="white"/>
    <path fill="white" d="M 35 13 L 35 61 A 29 24 0 0 1 35 13 Z"/>
    <path fill="#1D4ED8" d="M 35 24 L 35 50 A 18 13 0 0 1 35 24 Z"/>
    <circle cx="75" cy="75" r="10" fill="#F59E0B"/>
  </g>

  <!-- 60×60 -->
  <g transform="translate(502,268)">
    <rect width="60" height="60" rx="15" fill="#1D4ED8"/>
    <rect x="13" y="8" width="9" height="44" rx="4.5" fill="white"/>
    <path fill="white" d="M 22 8 L 22 38 A 18 15 0 0 1 22 8 Z"/>
    <path fill="#1D4ED8" d="M 22 15 L 22 31 A 11 8 0 0 1 22 15 Z"/>
    <circle cx="47" cy="47" r="6" fill="#F59E0B"/>
  </g>

  <!-- 40×40 -->
  <g transform="translate(584,278)">
    <rect width="40" height="40" rx="10" fill="#1D4ED8"/>
    <rect x="9" y="6" width="6" height="28" rx="3" fill="white"/>
    <path fill="white" d="M 15 6 L 15 25 A 12 9.5 0 0 1 15 6 Z"/>
    <path fill="#1D4ED8" d="M 15 11 L 15 20 A 7 4.5 0 0 1 15 11 Z"/>
    <circle cx="31" cy="31" r="4" fill="#F59E0B"/>
  </g>

  <!-- Size labels -->
  <text x="422" y="354" font-size="9" fill="#94A3B8" text-anchor="middle">96 px</text>
  <text x="532" y="337" font-size="9" fill="#94A3B8" text-anchor="middle">60 px</text>
  <text x="604" y="327" font-size="9" fill="#94A3B8" text-anchor="middle">40 px</text>


  <!-- ━━━ ZONE 3 : Palette couleurs ━━━ -->
  <rect x="40" y="374" width="640" height="96" rx="14" fill="white"/>
  <text x="58" y="394" font-size="8" font-weight="700" fill="#CBD5E1" letter-spacing="1.8">PALETTE</text>

  <!-- Swatch 1 -->
  <rect x="58" y="404" width="90" height="40" rx="8" fill="#1D4ED8"/>
  <text x="58" y="458" font-size="10" font-weight="600" fill="#1E293B">#1D4ED8</text>
  <text x="58" y="471" font-size="9" fill="#64748B">Bleu primaire</text>

  <!-- Swatch 2 -->
  <rect x="168" y="404" width="90" height="40" rx="8" fill="#2563EB"/>
  <text x="168" y="458" font-size="10" font-weight="600" fill="#1E293B">#2563EB</text>
  <text x="168" y="471" font-size="9" fill="#64748B">Bleu clair</text>

  <!-- Swatch 3 -->
  <rect x="278" y="404" width="90" height="40" rx="8" fill="#F59E0B"/>
  <text x="278" y="458" font-size="10" font-weight="600" fill="#1E293B">#F59E0B</text>
  <text x="278" y="471" font-size="9" fill="#64748B">Or accent</text>

  <!-- Swatch 4 -->
  <rect x="388" y="404" width="90" height="40" rx="8" fill="#1A202C"/>
  <text x="388" y="458" font-size="10" font-weight="600" fill="#1E293B">#1A202C</text>
  <text x="388" y="471" font-size="9" fill="#64748B">Texte</text>

  <!-- Swatch 5 -->
  <rect x="498" y="404" width="90" height="40" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="498" y="458" font-size="10" font-weight="600" fill="#1E293B">#F1F5F9</text>
  <text x="498" y="471" font-size="9" fill="#64748B">Fond</text>

</svg>
